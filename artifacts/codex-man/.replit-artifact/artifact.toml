kind = "web"
previewPath = "/"
title = "Codex Man"
version = "1.0.0"
id = "artifacts/codex-man"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23589

[services.development]
run = "pnpm --filter @workspace/codex-man run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/codex-man", "run", "build" ]
publicDir = "artifacts/codex-man/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23589"
BASE_PATH = "/"
